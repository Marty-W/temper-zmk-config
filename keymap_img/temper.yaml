layers:
  default:
  - [⇪, Q, W, E, R, T, Y, U, I, O]
  - [P, num, '&hml LALT A', '&hml LGUI S', '&hml LCTRL D', '&hml LSHFT F', G, H, '&hmr RSHFT J', '&hmr RCTRL K']
  - - '&hmr RGUI L'
    - '&hmr RALT SEMI'
    - {t: num, h: toggle}
    - Z
    - X
    - C
    - V
    - B
    - N
    - M
  - - '&td_comma'
    - '&td_dot'
    - {t: /, s: '?'}
    - ↹
    - {t: BACKSPACE, s: Alt+BACKSPACE}
    - {t: ESC, h: raise}
    - {t: ENTER, h: lower}
    - SPACE
    - {t: Meh+⌘, h: sticky}
  lower:
  - ['~', '!', '@', '#', $, '%', ^, '&', '*', _]
  - - +
    - ⌃
    - {t: '`', s: '~'}
    - ''''
    - '"'
    - {t: '-', s: _}
    - '|'
    - \
    - '!'
    - {t: '=', s: +}
  - - {t: ;, s: ':'}
    - ':'
    - ⇧
    - <
    - '>'
    - _
    - {t: /, s: '?'}
    - {t: ., s: '>'}
    - {t: ',', s: <}
    - '?'
  - - '!'
    - {t: ;, s: ':'}
    - ':'
    - DEL
    - {t: '=', s: +}
    - '>'
    - {type: held}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
  raise:
  - [ESC, BRI DN, BRI UP, PREV, PP, NEXT, Alt+1, Alt+2, Alt+3, Alt+4]
  - [Alt+5, Gui+A, Gui+Sft+←, Gui+Sft+→, Gui+G, Gui+Sft+G, ←, ↓, ↑, →]
  - [CAPS, ⌃, ⌘, Alt+BSPC, Gui+BSPC, HOME, END, HOME, PG DN, PG UP]
  - - END
    - Gui+Sft+4
    - Gui+Sft+5
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {type: held}
    - ↹
    - 'VOL

      MUTE'
    - VOL UP
  num:
  - - ESC
    - CALC
    - KP SLASH
    - KP MULTIPLY
    - KP MINUS
    - KP PLUS
    - {t: ▽, type: trans}
    - '7'
    - '8'
    - '9'
  - - {t: '-', s: _}
    - {t: ⌃, type: held}
    - ←
    - ↓
    - ↑
    - →
    - ↹
    - {t: ▽, type: trans}
    - '4'
    - '5'
  - ['6', +, ⇧, HOME, PG DN, PG UP, END, ENTER, KP ENTER, '1']
  - - '2'
    - '3'
    - {t: '=', s: +}
    - {t: ▽, type: trans}
    - {t: ▽, type: trans}
    - {t: default, h: toggle}
    - {t: ., s: '>'}
    - '0'
    - {t: ',', s: <}
